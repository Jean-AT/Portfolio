<section class="bg-zinc-900/50 py-32 border-y border-navy" id="technologies">
  <div class="px-6 md:px-12 max-w-7xl mx-auto">
    <div class="mb-20">
      <span class="text-navy-blue font-semibold uppercase tracking-widest text-[10px]">Stack & Proficiency</span>
      <h2 class="text-4xl md:text-5xl font-extrabold tracking-tighter mt-2 text-white uppercase">TECHNICAL ECOSYSTEM</h2>
    </div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      @for (tech of techs; track tech.name) {
        @if (tech.wide) {
          <div class="col-span-2 bg-zinc-900 p-8 rounded-xl flex items-center gap-8 group hover:bg-white transition-all duration-500 border border-white/5">
            <span class="material-symbols-outlined text-6xl text-white group-hover:text-black transition-colors">{{ tech.icon }}</span>
            <div>
              <h3 class="text-2xl font-bold text-white group-hover:text-black transition-colors">{{ tech.name }}</h3>
              <p class="text-sm text-zinc-400 mt-2 group-hover:text-black/70 transition-colors">{{ tech.description }}</p>
            </div>
          </div>
        } @else {
          <div class="bg-zinc-900 p-6 rounded-xl flex flex-col justify-between aspect-square group hover:bg-white transition-all duration-500 border border-white/5">
            <span class="material-symbols-outlined text-4xl text-white group-hover:text-black transition-colors">{{ tech.icon }}</span>
            <div>
              <h3 class="text-lg font-bold text-white group-hover:text-black transition-colors">{{ tech.name }}</h3>
              <p class="text-[10px] text-zinc-500 mt-1 group-hover:text-black/70 transition-colors uppercase tracking-widest">{{ tech.description }}</p>
            </div>
          </div>
        }
      }
    </div>
  </div>
</section>
